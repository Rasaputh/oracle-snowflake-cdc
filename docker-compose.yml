version: '3.8'

services:

  # ============================================
  # Oracle 23ai Free Database (Source)
  # ============================================
  oracle:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-23ai
    ports:
      - "1521:1521"    # Oracle DB port
      - "5500:5500"    # Oracle EM Express port
    environment:
      - ORACLE_PWD=Welcome1234#    # password for SYS/SYSTEM user
      - ORACLE_CHARACTERSET=AL32UTF8
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle:/opt/oracle/scripts/setup
    shm_size: '1gb'

  # ============================================
  # Apache NiFi (CDC Pipeline)
  # ============================================
  nifi:
    image: apache/nifi:latest
    container_name: nifi
    ports:
      - "8443:8443"    # NiFi web UI port
    environment:
      - NIFI_WEB_HTTPS_PORT=8443
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=admin123456789
    volumes:
      - nifi-data:/opt/nifi/nifi-current/data
      - ./nifi:/opt/nifi/nifi-current/conf/flow
    depends_on:
      - oracle

volumes:
  oracle-data:
  nifi-data: